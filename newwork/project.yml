name: PetFeedCheck
options:
  bundleIdPrefix: com.petfeedcheck
  deploymentTarget:
    iOS: "17.0"
    visionOS: "1.0"
  xcodeVersion: "15.0"

settings:
  base:
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2,7"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator xros xrsimulator"

targets:
  PetFeedCheck:
    type: application
    platform: iOS
    sources:
      - path: PetFeedCheck
    settings:
      base:
        INFOPLIST_FILE: PetFeedCheck/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.petfeedcheck.app
        PRODUCT_NAME: PetFeedCheck
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "用于拍摄宠物食品标签照片进行合规审核"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "用于选择宠物食品标签照片进行合规审核"
        INFOPLIST_KEY_CFBundleDisplayName: "宠标通"
        INFOPLIST_KEY_UIStatusBarStyle: "UIStatusBarStyleDarkContent"
    dependencies: []
    preBuildScripts: []
    postBuildScripts: []
