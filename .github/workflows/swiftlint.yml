name: SwiftLint

on:
  push:
    branches: [main, develop]
    paths:
      - 'newwork/**'
  pull_request:
    branches: [main]
    paths:
      - 'newwork/**'

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --reporter github --strict
        continue-on-error: true
