name: Windows Validation

on:
  push:
    branches: [main, develop]
    paths:
      - 'newwork/**'
  workflow_dispatch:

jobs:
  swift-lint:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift on Windows
        uses: compnerd/gha-setup-swift@v1
        with:
          version: '5.9'

      - name: Check Swift Syntax (no iOS SDK — compile check only)
        run: |
          Get-ChildItem -Path newwork/PetFeedCheck -Recurse -Filter *.swift | ForEach-Object {
            Write-Host "Checking: $($_.FullName)"
            swiftc -parse $_.FullName 2>&1 || Write-Host "WARNING: Parse errors (expected without iOS SDK)"
          }
